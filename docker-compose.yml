services:
  mongodb:
    build:
      context: ./mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval \"db.adminCommand('ping').ok\" | grep 1 >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

  backend:
    build:
      context: ./backend
    ports:
      - "5000:5000"
    environment:
      PORT: "5000"
      MONGODB_URI: "mongodb://mongodb:27017/sk-properties"
      FRONTEND_URL: "http://localhost:3000"
      JWT_SECRET: "dev_jwt_secret_change_me"
      JWT_REFRESH_SECRET: "dev_jwt_refresh_secret_change_me"
    depends_on:
      mongodb:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: "http://localhost:5000"
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mongo_data:
